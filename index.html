    <title>RED SANS - Plotagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        body {
            /* Coloque aqui o nome do arquivo da SUA imagem de fundo inteira */
            background-image: url('RED_20260721_141026_0000.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 100px;  /* Dá espaço para o topo da sua imagem */
            padding-bottom: 100px; /* Dá espaço para o rodapé da sua imagem */
        }

        /* Container que centraliza apenas os dois cards */
        .main-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cards de Plotagem */
        .card {
            background: rgba(18, 18, 18, 0.95);
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.9);
        }

        .card h2 {
            font-size: 22px;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* Botões de Copiar */
        .btn-copiar {
            width: 100%;
            background: #ff0000;
            color: #ffffff;
            border: none;
            padding: 14px 0;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.4);
            transition: transform 0.1s ease, background 0.2s ease;
        }

        .btn-copiar:active {
            transform: scale(0.98);
            background: #cc0000;
        }

        /* --- BOTÃO INVISÍVEL SOBRE O "INSCREVA-SE" DA SUA IMAGEM --- */
        .link-inscreva-se {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px; /* Altura da área do "INSCREVA-SE" no fundo */
            z-index: 1000;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
