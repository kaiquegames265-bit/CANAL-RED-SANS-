    /* Estrutura Central das Caixas */

    /* Caixas Pretas (Estilo Exato da Imagem) */
    .card {
      background: linear-gradient(180deg, #2b2b2b 0%, #151515 100%);
      border: 2px solid #ff0000;
      border-radius: 20px;
      padding: 25px 20px;
      text-align: center;
      box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Título Interno */
    .card-title {
      color: #ffffff;
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.3;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    /* Botão Vermelho */
    .btn-red {
      width: 100%;
      background-color: #ff0000;
      color: #ffffff;
      border: none;
      padding: 14px 0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(255, 0, 0, 0.4);
      transition: transform 0.1s ease, background-color 0.2s ease;
    }

    .btn-red:active {
      transform: scale(0.97);
      background-color: #cc0000;
    }

    /* Esconde os códigos brutos da tela */
    .code-data {

    }

  <script>
    function copiarCodigo(id, botao) {
      const texto = document.getElementById(id).value;
      
      navigator.clipboard.writeText(texto).then(() => {
        const textoOriginal = botao.innerText;
        botao.innerText = 'Copiado!';
        botao.style.backgroundColor = '#00aa00';
        
        setTimeout(() => {
          botao.innerText = textoOriginal;
          botao.style.backgroundColor = '#ff0000';
        }, 2000);
      });
    }
  </script>
