<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED SANS - Plotagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        body {
            background-color: #0d0000;
            /* Se quiser usar a sua própria imagem de fundo, descomente a linha abaixo e coloque o caminho da imagem */
             background-image: url('RED_20260721_141026_0000.png'); */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* Banner de Topo */
        .header {
            width: 100%;
            background: linear-gradient(180deg, rgba(180, 0, 0, 0.6) 0%, rgba(10, 0, 0, 0.9) 100%);
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 2px 2px 4px #000;
        }

        .avatar-placeholder {
            width: 60px;
            height: 60px;
            background-color: #e60000;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }

        /* Container Principal */
        .main-container {
            width: 90%;
            max-width: 420px;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Cards de Plotagem */
        .card {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #e60000;
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8), inset 0 0 10px rgba(230, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        .card h2 {
            font-size: 22px;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px #000;
        }

        /* Botões de Copiar */
        .btn-copiar {
            width: 100%;
            background: #ff0000;
            color: #ffffff;
            border: none;
            padding: 14px 0;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .btn-copiar:active {
            transform: scale(0.98);
            background: #cc0000;
        }

        /* Texto/Rodapé INSCREVA-SE */
        .footer-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(0deg, rgba(150, 0, 0, 0.95) 0%, rgba(50, 0, 0, 0.8) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 2px solid #ff0000;
            z-index: 90;
        }

        .footer-banner span {
            font-size: 32px;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 2px 2px 5px #000;
        }

        /* --- BOTÃO INVISÍVEL CLICÁVEL --- */
        .link-inscreva-se {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px; /* Cobrirá exatamente a área do Inscreva-se */
            z-index: 100; /* Fica acima de tudo para receber o clique */
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Topo com nome e avatar -->
    <div class="header">
        <h1>RED</h1>
        <div class="avatar-placeholder"></div>
        <h1>SANS</h1>
    </div>

    <!-- Container dos Botões/Cards -->
    <div class="main-container">

        <!-- Plotagem Corpo -->
        <div class="card">
            <h2>PLOTAGEM<br>CORPO</h2>
            <button class="btn-copiar" onclick="copiarCodigo('COLE_O_CODIGO_DO_CORPO_AQUI')">Copiar</button>
        </div>

        <!-- Plotagem Vidro -->
        <div class="card">
            <h2>PLOTAGEM<br>VIDRO</h2>
            <button class="btn-copiar" onclick="copiarCodigo('COLE_O_CODIGO_DO_VIDRO_AQUI')">Copiar</button>
        </div>

    </div>

    <!-- Visual do Rodapé -->
    <div class="footer-banner">
        <span>INSCREVA-SE</span>
    </div>

    <!-- BOTÃO INVISÍVEL REDIRECIONANDO PARA SEU CANAL -->
    <a href="https://www.youtube.com/@RedSans00215" target="_blank" class="link-inscreva-se" title="Inscreva-se no canal Red Sans!"></a>

    <script>
        function copiarCodigo(texto) {
            navigator.clipboard.writeText(texto).then(() => {
                alert('Código copiado com sucesso!');
            }).catch(err => {
                alert('Erro ao copiar o código.');
            });
        }
    </script>
</body>
</html>
