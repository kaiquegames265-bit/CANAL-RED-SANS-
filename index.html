<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Inicial</title>
  <!-- Link para o arquivo CSS contendo as regras da imagem -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Container principal centralizado pelo CSS (.container) -->
  <div class="container">
    
    <!-- Imagem opcional formatada pelas regras img do CSS -->
    <img src="RED_20260720_233507_0000.png" alt="Imagem principal">
    
    <!-- Título principal estilizado pelo h1 do CSS -->
    <h1>Seu Título Aqui</h1>

    <!-- Botão estilizado pelo seletor button do CSS -->
    <button type="button">Copiar</button>

  </div>

</body>
</html>
